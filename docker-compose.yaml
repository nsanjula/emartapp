version: "3.8"

services:
  client:
    build:
      context: ./client # Path to the dockerfile for the client service
    ports:
      - "4200:4200"
    container_name: client

    # This section basically defines the startup order (based on dependency)
    depends_on:
      - api
      - webapi

  api:
    build:
      context: ./nodeapi
    ports:
      - "5000:5000"

    # Here it will restart the container automatically if it crashes or stops for any reason. This is useful for ensuring that the service is always available and can recover from unexpected failures. The "always" policy means that the container will be restarted regardless of the exit status, whether it exited with an error or not.
    restart: always
    container_name: api
    depends_on:
      - nginx
      - emongo

  webapi:
    build:
      context: ./javaapi
    ports:
      - "9000:9000"
    restart: always
    container_name: webapi
    depends_on:
      - emartdb

  nginx:
    restart: always
    image: nginx:latest
    container_name: nginx

    # Mapping configuration file for nginx. So basically, we are copying the default.conf file from the host machine to the container. This file contains the routing rules for the api and webapi services.
    volumes:
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
    ports:
      - "80:80"
    depends_on:
      - client

  emongo:
    image: mongo:4
    container_name: emongo
    environment:
      - MONGO_INITDB_DATABASE=epoc
    ports:
      - "27017:27017"

  emartdb:
    image: mysql:8.0.33
    container_name: emartdb
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=emartdbpass
      - MYSQL_DATABASE=books
